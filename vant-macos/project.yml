name: Vant
options:
  bundleIdPrefix: com.vant
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"

targets:
  VantIME:
    type: application
    platform: macOS
    sources:
      - path: VantIME
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vant.inputmethod.Vant
        INFOPLIST_FILE: VantIME/Info.plist
        CODE_SIGN_ENTITLEMENTS: VantIME/VantIME.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: VantIME/VantIME-Bridging-Header.h
        LS_BACKGROUND_ONLY: true
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../vant-engine/target/release"
          - "$(PROJECT_DIR)/../vant-engine/target/debug"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../vant-engine"
        OTHER_LDFLAGS:
          - "-lvant_engine"
    dependencies: []

  Vant:
    type: application
    platform: macOS
    sources:
      - path: Vant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vant.settings
        INFOPLIST_FILE: Vant/Info.plist
    dependencies: []
